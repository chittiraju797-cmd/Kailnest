<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kailnest" />
  <meta name="description" content="Find PG, Hotels, Apartments & Houses across India" />
  <meta name="keywords" content="PG, hostel, apartments, houses, India, accommodation" />
  <meta name="google" content="notranslate" />
  <title>Kailnest — PG · Hotels · Apartments · Houses</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/chittiraju797-cmd/Kailnest/main/1782926117778.png" />
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/chittiraju797-cmd/Kailnest/main/1782926117778.png" />

  <!-- Open Graph (WhatsApp/social share) -->
  <meta property="og:title" content="Kailnest - PG, Hotels & Houses" />
  <meta property="og:description" content="Find your perfect accommodation across India" />
  <meta property="og:image" content="https://raw.githubusercontent.com/chittiraju797-cmd/Kailnest/main/1782926117778.png" />
  <meta property="og:url" content="https://kailnest.in" />
  <meta property="og:type" content="website" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
    #root { max-width: 430px; margin: 0 auto; min-height: 100vh; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column;
      background: linear-gradient(135deg, #1e1b4b, #4338ca); color: white;
    }
    #loading img { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 16px; }
    #loading p { font-size: 12px; opacity: 0.7; margin-top: 8px; }

    /* PWA Install Banner */
    #install-banner {
      display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #fff; border-radius: 16px; padding: 14px 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15); z-index: 9999;
      width: calc(100% - 32px); max-width: 400px;
      border: 1px solid #e5e7eb;
    }
    #install-banner.show { display: flex; align-items: center; gap: 12px; }
    #install-banner img { width: 44px; height: 44px; border-radius: 10px; }
    #install-banner .text { flex: 1; }
    #install-banner .text h4 { font-size: 14px; font-weight: 700; color: #111; }
    #install-banner .text p { font-size: 12px; color: #6b7280; margin-top: 2px; }
    #install-btn { background: #6366f1; color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
    #dismiss-btn { background: none; border: none; color: #9ca3af; font-size: 18px; cursor: pointer; padding: 4px; }
  </style>


</head>
<body>
  <div id="recaptcha-container"></div>
  <div <div id="recaptcha-container"></div>
    <img src="https://raw.githubusercontent.com/chittiraju797-cmd/Kailnest/main/1782926117778.png" alt="Kailnest" />
    <p>Loading...</p>
  </div>
  <div id="root" style="display:none"></div>

  <!-- PWA Install Banner -->
  <div id="install-banner">
    <img src="https://raw.githubusercontent.com/chittiraju797-cmd/Kailnest/main/1782926117778.png" alt="Kailnest" />
    <div class="text">
      <h4>Install Kailnest</h4>
      <p>Add to your home screen — use it like an app!</p>
    </div>
    <button id="install-btn">Install</button>
    <button id="dismiss-btn">✕</button>
  </div>

  <!-- React + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

  <script>
    // Firebase init
    const firebaseConfig = {
      apiKey: "AIzaSyAC8ZgnSvJEAsEgrGPOSA-Ih9UqNFIOPog",
      authDomain: "kailnest-app.firebaseapp.com",
      projectId: "kailnest-app",
      storageBucket: "kailnest-app.firebasestorage.app",
      messagingSenderId: "845274786181",
      appId: "1:845274786181:web:e47a6e96ea6e17ba35fcec",
      measurementId: "G-PMR1DKH7C6"
    };
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.firestore();
    window.auth = firebase.auth();

    // Sign in anonymously so Firestore security rules can require
    // `request.auth != null` (blocking direct API abuse from outside the app)
    // without needing a full account system. Skips if already signed in
    // (e.g. via Google Sign-in elsewhere in the app).
    window.auth.onAuthStateChanged((user) => {
      if (!user) {
        window.auth.signInAnonymously().catch((e) => console.log("Anonymous sign-in error:", e));
      }
    });

    console.log("Firebase initialized ✅");

    // Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('SW registered ✅', reg.scope);
            window.swRegistration = reg;

            // Check for a newer deployed version every 60 seconds while the
            // app is open (in addition to the automatic check on page load).
            setInterval(() => reg.update(), 60 * 1000);

            // Fires when a new service worker (i.e. new deployed code) is
            // found. Only notify if this isn't the very first install
            // (navigator.serviceWorker.controller is null on first install).
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('kailnest-update-available'));
                }
              });
            });
          })
          .catch(err => console.log('SW error:', err));
      });
    }

    // PWA Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const banner = document.getElementById('install-banner');
      if (banner) banner.classList.add('show');
    });

    document.getElementById('install-btn')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('Install outcome:', outcome);
        deferredPrompt = null;
        document.getElementById('install-banner').classList.remove('show');
      }
    });

    document.getElementById('dismiss-btn')?.addEventListener('click', () => {
      document.getElementById('install-banner').classList.remove('show');
    });

    // Push notification permission
    window.requestPushPermission = async () => {
      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          console.log('Push notifications enabled ✅');
          return true;
        }
        return false;
      } catch (e) {
        console.log('Push permission error:', e);
        return false;
      }
    };

    // Show app after load
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('root').style.display = 'block';
      }, 800);
    });
  </script>

  <script type="text/babel" src="app.jsx" data-type="module"></script>
</body>
</html>
