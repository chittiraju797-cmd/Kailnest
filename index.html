<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kailnest" />
  <title>Kailnest — PG · Hotels · Apartments · Houses</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
    #root { max-width: 430px; margin: 0 auto; min-height: 100vh; }
    #loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; background: linear-gradient(135deg, #1e1b4b, #4338ca); color: white; font-family: sans-serif; }
    #loading h1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-top: 16px; }
    #loading p { font-size: 12px; opacity: 0.7; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="loading">
    <div style="font-size:60px">🏠</div>
    <h1>KAILNEST</h1>
    <p>Loading...</p>
  </div>
  <div id="root" style="display:none"></div>

  <!-- React + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" src="app.jsx" data-type="module"></script>

  <script>
    // Hide loading screen once app renders
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        var root = document.getElementById('root');
        if (loading) loading.style.display = 'none';
        if (root) root.style.display = 'block';
      }, 500);
    });
  </script>
</body>
</html>
